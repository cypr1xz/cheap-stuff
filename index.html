<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Server</title>
    <style>
        :root {
            --primary: #5865F2; /* Discord Blue */
            --accent: #00d9ff;
            --bg: #0f0f13;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif, Arial;
            overflow: hidden; /* Prevents scrollbars from breaking the vibe */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Custom Cursor --- */
        #cursor {
            width: 25px;
            height: 25px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--accent);
            transition: transform 0.05s linear;
        }

        /* --- Background Glow --- */
        .glow {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(88, 101, 242, 0.2) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        /* --- Main Card --- */
        .main-card {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            margin-top: 2rem;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.5);
            background: #4752c4;
        }

        /* --- Infinite Text Passage --- */
        .ticker-container {
            position: absolute;
            bottom: 20px;
            width: 100%;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ticker-text {
            display: flex;
            white-space: nowrap;
            animation: scroll 20s linear infinite;
        }

        .ticker-text span {
            font-size: 1.5rem;
            font-weight: 800;
            padding: 0 40px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="glow"></div>

    <div class="main-card">
        <h1>The Best Server</h1>
        <p style="color: #888;">The community you've been looking for.</p>
        <button class="btn" onclick="copyLink()">GET DISCORD INVITE</button>
        <p id="msg" style="margin-top: 15px; color: var(--accent); font-weight: bold; visibility: hidden;">COPIED TO CLIPBOARD!</p>
    </div>

    <div class="ticker-container">
        <div class="ticker-text">
            <span>THE BEST COMMUNITY</span>
            <span>ACTIVE VC 24/7</span>
            <span>CUSTOM BOTS</span>
            <span>FRIENDLY STAFF</span>
            <span>WEEKLY EVENTS</span>
            <span>THE BEST COMMUNITY</span>
            <span>ACTIVE VC 24/7</span>
            <span>CUSTOM BOTS</span>
            <span>FRIENDLY STAFF</span>
            <span>WEEKLY EVENTS</span>
        </div>
    </div>

    <script>
        // Move the custom cursor
        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Copy function
        function copyLink() {
            const link = "https://discord.gg/yourlink"; // Put your real link here
            navigator.clipboard.writeText(link);
            
            const msg = document.getElementById('msg');
            msg.style.visibility = 'visible';
            setTimeout(() => { msg.style.visibility = 'hidden'; }, 2000);
        }
    </script>
</body>
</html>
