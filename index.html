<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Best Server</title>
    <style>
        :root {
            --primary: #7289da;
            --accent: #00f2ff;
            --bg: #0a0a0c;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Hide default cursor */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* --- Custom Cursor --- */
        #cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 15px var(--accent);
        }

        /* --- Background Decoration --- */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
            border-radius: 50%;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* --- Main Layout --- */
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 600px;
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.desc {
            color: #aaa;
            margin-bottom: 2rem;
        }

        /* --- Button Effects --- */
        .join-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(114, 137, 218, 0.4);
        }

        .join-btn:hover {
            transform: scale(1.05);
            background: #5b73c7;
            box-shadow: 0 0 30px rgba(114, 137, 218, 0.6);
        }

        /* --- Infinite Passage Ticker --- */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            height: 4rem;
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--accent);
            display: flex;
            align-items: center;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: ticker 30s linear infinite;
        }

        .ticker-item {
            display: inline-block;
            padding: 0 2rem;
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="blob"></div>

    <div class="container">
        <h1>The Best Server</h1>
        <p class="desc">Experience the pinnacle of community, gaming, and vibes. Why join anywhere else?</p>
        
        <button class="join-btn" onclick="copyInvite()">GET INVITE LINK</button>
        
        <p id="status" style="margin-top: 15px; font-size: 0.9rem; color: var(--accent); opacity: 0;"></p>
    </div>

    <div class="ticker-wrap">
        <div class="ticker">
            <span class="ticker-item">BECAUSE WE HAVE THE BEST STAFF</span>
            <span class="ticker-item">NO TOXICITY ALLOWED</span>
            <span class="ticker-item">WEEKLY GIVEAWAYS</span>
            <span class="ticker-item">THE HIGHEST QUALITY CHANNELS</span>
            <span class="ticker-item">ACTIVE 24/7</span>
            <span class="ticker-item">UNIQUE CUSTOM BOTS</span>
            <span class="ticker-item">BECAUSE WE HAVE THE BEST STAFF</span>
            <span class="ticker-item">NO TOXICITY ALLOWED</span>
            <span class="ticker-item">WEEKLY GIVEAWAYS</span>
        </div>
    </div>

    <script>
        // Custom Cursor Movement
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Copy Link Function
        function copyInvite() {
            const inviteLink = "https://discord.gg/your-invite-code"; // Replace with your link
            navigator.clipboard.writeText(inviteLink);
            
            const status = document.getElementById('status');
            status.innerText = "Link copied to clipboard!";
            status.style.opacity = "1";
            
            setTimeout(() => {
                status.style.opacity = "0";
            }, 2000);
        }
    </script>
</body>
</html>
